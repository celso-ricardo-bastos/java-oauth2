spring:
  application:
    name: AuthanticationServer
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: ${DATASOURCE_DRIVER:org.postgresql.Driver}
  jpa:
    show-sql: true
    properties:
      hibernate.format_sql: true
server:
  port: 8082